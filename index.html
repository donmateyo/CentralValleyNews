<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Central Valley News Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#5D5CDE",
              "dark-bg": "#181818",
              "dark-surface": "#2A2A2A",
            },
          },
        },
      };
    </script>

    <!-- Inter font for more professional typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      /* Typography + base polish */
      html {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: "Inter", ui-sans-serif, system-ui, -apple-system,
          "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans",
          "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      }

      /* Subtle enter animations */
      @keyframes slideInUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeInScale {
        from {
          opacity: 0;
          transform: scale(0.98);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .animate-slide-in {
        animation: slideInUp 0.4s ease-out forwards;
      }
      .animate-fade-in-scale {
        animation: fadeInScale 0.35s ease-out forwards;
      }

      /* Card polish */
      .news-card {
        transition: box-shadow 0.2s ease, transform 0.2s ease;
      }
      .news-card:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      }

      /* Make list items subtle and accessible */
      .news-item a {
        transition: background-color 0.2s ease, color 0.2s ease,
          transform 0.2s ease;
        border-left: 2px solid transparent;
      }
      .news-item a:hover,
      .news-item a:focus-visible {
        background: rgba(93, 92, 222, 0.06);
        border-left-color: #5d5cde;
      }

      /* Tone down flashy effects */
      .news-title {
        animation: none !important;
        -webkit-text-fill-color: inherit;
        background: none;
        color: inherit;
      }
      .sparkle::before {
        display: none;
      }
      .floating-particles {
        display: none !important;
      }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 0.5rem;
        padding: 0.5rem;
        transition: transform 0.15s ease, box-shadow 0.2s ease,
          background-color 0.2s ease;
      }
      .btn:hover {
        transform: translateY(-1px);
      }

      /* Loading skeletons */
      .skeleton {
        background: linear-gradient(
          90deg,
          rgba(0, 0, 0, 0.06) 25%,
          rgba(0, 0, 0, 0.12) 37%,
          rgba(0, 0, 0, 0.06) 63%
        );
        background-size: 400% 100%;
        animation: shimmer 1.4s ease infinite;
      }
      .dark .skeleton {
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.06) 25%,
          rgba(255, 255, 255, 0.12) 37%,
          rgba(255, 255, 255, 0.06) 63%
        );
      }
      @keyframes shimmer {
        0% {
          background-position: 100% 0;
        }
        100% {
          background-position: -100% 0;
        }
      }
    </style>
  </head>

  <body
    class="bg-white dark:bg-dark-bg text-gray-900 dark:text-white min-h-screen transition-colors duration-300"
  >
    <!-- Loading Spinner -->
    <div
      id="loading"
      class="fixed inset-0 bg-white dark:bg-dark-bg flex items-center justify-center z-50"
    >
      <div class="text-center">
        <div
          class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary mx-auto mb-4"
        ></div>
        <p class="text-gray-600 dark:text-gray-400">
          Loading Central Valley News...
        </p>
      </div>
    </div>

    <!-- Header -->
    <header
      class="header-enhanced sticky top-0 z-40 bg-white/90 dark:bg-dark-bg/90 backdrop-blur border-b border-gray-200 dark:border-gray-800"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center space-x-3">
            <i class="fas fa-newspaper text-primary text-2xl"></i>
            <div>
              <h1 class="text-xl font-semibold leading-tight">
                Central Valley News
              </h1>
              <p class="text-xs text-gray-500 dark:text-gray-400">
                by Matthew Flores
              </p>
            </div>
          </div>

          <div class="flex items-center space-x-4">
            <div
              id="last-updated"
              class="hidden sm:flex items-center text-xs text-gray-500 dark:text-gray-400"
              aria-live="polite"
            >
              <i class="far fa-clock mr-1"></i>
              <span id="last-updated-value">Just now</span>
            </div>

            <!-- Refresh Button -->
            <button
              id="refresh-btn"
              class="btn bg-primary text-white shadow-sm hover:shadow-md"
              title="Refresh News"
            >
              <i class="fas fa-sync-alt"></i>
            </button>

            <!-- Theme Toggle -->
            <button
              id="theme-toggle"
              class="btn bg-amber-500 text-white shadow-sm hover:shadow-md"
              title="Toggle Theme"
            >
              <i class="fas fa-moon dark:hidden"></i>
              <i class="fas fa-sun hidden dark:inline"></i>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 space-y-8">
      <!-- Weather Bar -->
      <section
        class="rounded-xl shadow-sm p-5 border border-gray-200 dark:border-gray-700 bg-white dark:bg-dark-surface animate-fade-in-scale"
        aria-label="Weather"
      >
        <div class="flex items-center justify-between">
          <!-- Visalia Weather -->
          <div class="text-left">
            <h3
              class="text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 flex items-center"
            >
              <span class="mr-2">Visalia</span>
              <i class="fas fa-seedling text-xs opacity-60"></i>
            </h3>
            <div class="flex items-center space-x-3">
              <i
                id="tulare-weather-icon"
                class="fas fa-cloud text-2xl text-gray-400"
                aria-hidden="true"
              ></i>
              <div>
                <div
                  class="text-xl font-semibold"
                  id="tulare-temp"
                >
                  --°F
                </div>
                <div
                  class="text-xs text-gray-500 dark:text-gray-400"
                  id="tulare-condition"
                >
                  Loading...
                </div>
              </div>
            </div>
          </div>

          <!-- Fresno Weather -->
          <div class="text-right">
            <h3
              class="text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 flex items-center justify-end"
            >
              <i
                class="fas fa-city text-xs opacity-60 mr-2"
                aria-hidden="true"
              ></i>
              <span>Fresno</span>
            </h3>
            <div class="flex items-center justify-end space-x-3">
              <div>
                <div
                  class="text-xl font-semibold"
                  id="fresno-temp"
                >
                  --°F
                </div>
                <div
                  class="text-xs text-gray-500 dark:text-gray-400"
                  id="fresno-condition"
                >
                  Loading...
                </div>
              </div>
              <i
                id="fresno-weather-icon"
                class="fas fa-cloud text-2xl text-gray-400"
                aria-hidden="true"
              ></i>
            </div>
          </div>
        </div>
      </section>

      <!-- County News Cards -->
      <section
        class="grid grid-cols-1 lg:grid-cols-2 gap-8"
        aria-label="County news"
      >
        <!-- Tulare County Card -->
        <div
          class="news-card bg-white dark:bg-dark-surface rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden"
        >
          <div
            class="p-5 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between"
          >
            <div class="flex items-center">
              <i
                class="fas fa-seedling text-green-600 dark:text-green-400 mr-3"
                aria-hidden="true"
              ></i>
              <div>
                <h2 class="text-lg font-semibold">
                  Tulare County News
                </h2>
                <p
                  class="text-xs text-gray-500 dark:text-gray-400"
                >
                  Visalia, Porterville & surrounding areas
                </p>
              </div>
            </div>
          </div>

          <div id="tulare-news" class="p-5">
            <div class="text-center py-8">
              <div class="space-y-3 max-w-md mx-auto">
                <div class="h-4 rounded skeleton"></div>
                <div class="h-4 w-2/3 rounded skeleton"></div>
                <div class="h-4 w-3/4 rounded skeleton"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Fresno County Card -->
        <div
          class="news-card bg-white dark:bg-dark-surface rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden"
        >
          <div
            class="p-5 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between"
          >
            <div class="flex items-center">
              <i
                class="fas fa-city text-blue-600 dark:text-blue-400 mr-3"
                aria-hidden="true"
              ></i>
              <div>
                <h2 class="text-lg font-semibold">
                  Fresno County News
                </h2>
                <p
                  class="text-xs text-gray-500 dark:text-gray-400"
                >
                  Fresno, Clovis & surrounding areas
                </p>
              </div>
            </div>
          </div>

          <div id="fresno-news" class="p-5">
            <div class="text-center py-8">
              <div class="space-y-3 max-w-md mx-auto">
                <div class="h-4 rounded skeleton"></div>
                <div class="h-4 w-2/3 rounded skeleton"></div>
                <div class="h-4 w-3/4 rounded skeleton"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Error Toast -->
    <div
      id="error-toast"
      class="hidden fixed bottom-4 right-4 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg z-50"
      role="alert"
    >
      <div class="flex items-center">
        <i class="fas fa-exclamation-triangle mr-2"></i>
        <span id="error-message">An error occurred</span>
      </div>
    </div>

    <script>
      // Configuration (unchanged)
      const CONFIG = {
        TULARE_FEEDS: [
          "https://news.google.com/rss/search?q=Visalia%20CA%20news&hl=en-US&gl=US&ceid=US:en",
          "https://news.google.com/rss/search?q=Tulare%20County%20news&hl=en-US&gl=US&ceid=US:en",
          "https://news.google.com/rss/search?q=Porterville%20CA%20news&hl=en-US&gl=US&ceid=US:en",
        ],
        FRESNO_FEEDS: [
          "https://news.google.com/rss/search?q=Fresno%20CA%20news&hl=en-US&gl=US&ceid=US:en",
          "https://news.google.com/rss/search?q=Fresno%20County%20California&hl=en-US&gl=US&ceid=US:en",
          "https://news.google.com/rss/search?q=Clovis%20California%20news&hl=en-US&gl=US&ceid=US:en",
        ],
        HOURS_RECENT: 72,
        INITIAL_HEADLINES: 5,
        MAX_HEADLINES: 15,
        WEATHER_API_BASE: "https://api.open-meteo.com/v1/forecast",
        // Coordinates: Visalia (36.3302, -119.2921), Fresno (36.7378, -119.7871)
        TULARE_COORDS: { lat: 36.3302, lon: -119.2921 },
        FRESNO_COORDS: { lat: 36.7378, lon: -119.7871 },
      };

      // Application State
      let state = {
        tulareNews: [],
        fresnoNews: [],
        tulareWeather: null,
        fresnoWeather: null,
        lastUpdate: null,
        isDarkMode: false,
        tulareVisibleCount: CONFIG.INITIAL_HEADLINES,
        fresnoVisibleCount: CONFIG.INITIAL_HEADLINES,
      };

      // Dark mode initialization
      function initializeDarkMode() {
        if (
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches
        ) {
          document.documentElement.classList.add("dark");
          state.isDarkMode = true;
        }
        window
          .matchMedia("(prefers-color-scheme: dark)")
          .addEventListener("change", (event) => {
            if (event.matches) {
              document.documentElement.classList.add("dark");
              state.isDarkMode = true;
            } else {
              document.documentElement.classList.remove("dark");
              state.isDarkMode = false;
            }
          });
      }

      function showError(message) {
        console.error("Error:", message);
        const errorToast = document.getElementById("error-toast");
        const errorMessage = document.getElementById("error-message");
        errorMessage.textContent = message;
        errorToast.classList.remove("hidden");
        setTimeout(() => {
          errorToast.classList.add("hidden");
        }, 5000);
      }

      // Fetch RSS feed with CORS proxy (unchanged)
      async function fetchRSSFeed(url) {
        try {
          const proxyUrl =
            `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
          const response = await fetch(proxyUrl);

          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }

          const data = await response.json();
          return data.contents;
        } catch (error) {
          console.error(`Failed to fetch RSS feed ${url}:`, error);
          throw error;
        }
      }

      // Parse RSS feed (unchanged)
      function parseRSSFeed(xmlText, source) {
        try {
          const parser = new DOMParser();
          const xmlDoc = parser.parseFromString(xmlText, "text/xml");

          const parseError = xmlDoc.querySelector("parsererror");
          if (parseError) {
            console.error("XML parsing error:", parseError.textContent);
            return [];
          }

          const items = xmlDoc.querySelectorAll("item");
          const articles = [];

          items.forEach((item, index) => {
            try {
              const title = item
                .querySelector("title")
                ?.textContent?.trim();
              const link = item
                .querySelector("link")
                ?.textContent?.trim();
              const pubDate = item
                .querySelector("pubDate")
                ?.textContent?.trim();
              const description = item
                .querySelector("description")
                ?.textContent?.trim();

              if (title && link) {
                const publishedDate = pubDate
                  ? new Date(pubDate)
                  : new Date();
                const hoursAgo = Math.floor(
                  (Date.now() - publishedDate.getTime()) /
                    (1000 * 60 * 60)
                );

                if (hoursAgo <= CONFIG.HOURS_RECENT) {
                  articles.push({
                    title: title
                      .replace(/&amp;/g, "&")
                      .replace(/&lt;/g, "<")
                      .replace(/&gt;/g, ">"),
                    link,
                    publishedDate,
                    hoursAgo,
                    description: description
                      ? description
                          .replace(/<[^>]*>/g, "")
                          .slice(0, 120) + "..."
                      : "",
                    source,
                    id: `${link}-${index}`,
                  });
                }
              }
            } catch (itemError) {
              console.warn("Error parsing RSS item:", itemError);
            }
          });

          return articles;
        } catch (error) {
          console.error("RSS parsing error:", error);
          return [];
        }
      }

      // Weather fetching (unchanged)
      async function fetchWeatherForCity(coords, cityName) {
        try {
          const url =
            `${CONFIG.WEATHER_API_BASE}?latitude=${coords.lat}` +
            `&longitude=${coords.lon}` +
            "&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code" +
            "&temperature_unit=fahrenheit&wind_speed_unit=mph" +
            "&timezone=America%2FLos_Angeles";

          const response = await fetch(url);
          if (!response.ok) {
            throw new Error(`Weather API error for ${cityName}`);
          }

          const data = await response.json();

          const weatherCode = data.current.weather_code;
          const weatherInfo = getWeatherInfo(weatherCode);

          return {
            temperature: Math.round(data.current.temperature_2m),
            humidity: data.current.relative_humidity_2m,
            windSpeed: Math.round(data.current.wind_speed_10m),
            condition: weatherInfo.description,
            icon: weatherInfo.icon,
            city: cityName,
          };
        } catch (error) {
          console.error(`Weather fetch error for ${cityName}:`, error);
          throw error;
        }
      }

      async function fetchWeather() {
        try {
          const [tulareWeather, fresnoWeather] = await Promise.all([
            fetchWeatherForCity(CONFIG.TULARE_COORDS, "Tulare"),
            fetchWeatherForCity(CONFIG.FRESNO_COORDS, "Fresno"),
          ]);

          state.tulareWeather = tulareWeather;
          state.fresnoWeather = fresnoWeather;

          updateWeatherDisplay();
        } catch (error) {
          console.error("Weather fetch error:", error);
          showError("Failed to load weather data");
        }
      }

      function getWeatherInfo(code) {
        const weatherMap = {
          0: { description: "Clear Sky", icon: "fas fa-sun" },
          1: { description: "Mainly Clear", icon: "fas fa-sun" },
          2: { description: "Partly Cloudy", icon: "fas fa-cloud-sun" },
          3: { description: "Overcast", icon: "fas fa-cloud" },
          45: { description: "Fog", icon: "fas fa-smog" },
          48: { description: "Depositing Rime Fog", icon: "fas fa-smog" },
          51: { description: "Light Drizzle", icon: "fas fa-cloud-rain" },
          53: { description: "Moderate Drizzle", icon: "fas fa-cloud-rain" },
          55: { description: "Dense Drizzle", icon: "fas fa-cloud-rain" },
          61: { description: "Slight Rain", icon: "fas fa-cloud-rain" },
          63: { description: "Moderate Rain", icon: "fas fa-cloud-rain" },
          65: {
            description: "Heavy Rain",
            icon: "fas fa-cloud-showers-heavy",
          },
          71: { description: "Slight Snow", icon: "fas fa-snowflake" },
          73: { description: "Moderate Snow", icon: "fas fa-snowflake" },
          75: { description: "Heavy Snow", icon: "fas fa-snowflake" },
          95: { description: "Thunderstorm", icon: "fas fa-bolt" },
        };

        return (
          weatherMap[code] || {
            description: "Unknown",
            icon: "fas fa-question",
          }
        );
      }

      function updateWeatherDisplay() {
        if (state.tulareWeather) {
          document.getElementById("tulare-temp").textContent =
            `${state.tulareWeather.temperature}°F`;
          document.getElementById("tulare-condition").textContent =
            state.tulareWeather.condition;

          const tulareIcon =
            document.getElementById("tulare-weather-icon");
          tulareIcon.className = `fas text-2xl ${
            state.tulareWeather.icon
          } ${
            state.tulareWeather.icon.includes("fa-sun")
              ? "text-yellow-400"
              : state.tulareWeather.icon.includes("rain")
              ? "text-blue-400"
              : "text-gray-400"
          }`;
        }

        if (state.fresnoWeather) {
          document.getElementById("fresno-temp").textContent =
            `${state.fresnoWeather.temperature}°F`;
          document.getElementById("fresno-condition").textContent =
            state.fresnoWeather.condition;

          const fresnoIcon =
            document.getElementById("fresno-weather-icon");
          fresnoIcon.className = `fas text-2xl ${
            state.fresnoWeather.icon
          } ${
            state.fresnoWeather.icon.includes("fa-sun")
              ? "text-yellow-400"
              : state.fresnoWeather.icon.includes("rain")
              ? "text-blue-400"
              : "text-gray-400"
          }`;
        }
      }

      // Fetch all news (logic unchanged; UI updates added)
      async function fetchAllNews() {
        try {
          // Fetch Tulare County news
          const tularePromises = CONFIG.TULARE_FEEDS.map(
            async (feed) => {
              try {
                const data = await fetchRSSFeed(feed);
                return parseRSSFeed(data, "Tulare County");
              } catch (error) {
                console.warn(`Failed to fetch Tulare feed:`, error);
                return [];
              }
            }
          );

          // Fetch Fresno County news
          const fresnoPromises = CONFIG.FRESNO_FEEDS.map(
            async (feed) => {
              try {
                const data = await fetchRSSFeed(feed);
                return parseRSSFeed(data, "Fresno County");
              } catch (error) {
                console.warn(`Failed to fetch Fresno feed:`, error);
                return [];
              }
            }
          );

          const [tulareResults, fresnoResults] = await Promise.all([
            Promise.all(tularePromises),
            Promise.all(fresnoPromises),
          ]);

          // Process Tulare news
          const allTulare = tulareResults.flat();
          state.tulareNews = deduplicateArticles(allTulare)
            .sort((a, b) => b.publishedDate - a.publishedDate)
            .slice(0, CONFIG.MAX_HEADLINES);

          // Process Fresno news
          const allFresno = fresnoResults.flat();
          state.fresnoNews = deduplicateArticles(allFresno)
            .sort((a, b) => b.publishedDate - a.publishedDate)
            .slice(0, CONFIG.MAX_HEADLINES);

          state.lastUpdate = new Date();

          // Reset visible counts
          state.tulareVisibleCount = CONFIG.INITIAL_HEADLINES;
          state.fresnoVisibleCount = CONFIG.INITIAL_HEADLINES;

          updateDisplay();
          updateLastUpdated();
        } catch (error) {
          console.error("Error fetching news:", error);
          showError(
            "Failed to load news. Please check your internet connection."
          );
        }
      }

      function deduplicateArticles(articles) {
        const seen = new Set();
        return articles.filter((article) => {
          const normalizedTitle = article.title
            .toLowerCase()
            .replace(/[^\w\s]/g, "")
            .replace(/\s+/g, " ")
            .trim();

          if (seen.has(normalizedTitle)) return false;
          seen.add(normalizedTitle);
          return true;
        });
      }

      function updateDisplay() {
        updateTulareNews();
        updateFresnoNews();
      }

      // Layout-only: accessible anchors, focus states, subtle hover
      function renderNewsSection(
        articles,
        containerId,
        emptyMessage,
        emptyIcon,
        visibleCount,
        county
      ) {
        const container = document.getElementById(containerId);

        if (articles.length === 0) {
          container.innerHTML = `
            <div class="text-center py-8 text-gray-500 dark:text-gray-400">
              <i class="${emptyIcon} text-3xl mb-3"></i>
              <p>${emptyMessage}</p>
            </div>
          `;
          return;
        }

        const visibleArticles = articles.slice(0, visibleCount);
        const hasMoreArticles = articles.length > visibleCount;

        const articlesHTML = visibleArticles
          .map(
            (article, index) => `
          <article
            class="${
              index > 0
                ? "border-t border-gray-200 dark:border-gray-700 pt-4 mt-4"
                : ""
            } mb-2 animate-slide-in news-item"
          >
            <a
              href="${article.link}"
              target="_blank"
              rel="noopener noreferrer"
              class="group rounded-lg p-3 -m-3 block focus:outline-none focus:ring-2 focus:ring-primary/70 focus:ring-offset-2 focus:ring-offset-white dark:focus:ring-offset-dark-surface hover:bg-gray-50 dark:hover:bg-white/5"
              aria-label="${article.title.replace(/"/g, "&quot;")}"
            >
              <h3
                class="text-base font-medium text-gray-900 dark:text-white group-hover:text-primary transition-colors duration-150 leading-snug"
              >
                ${article.title}
              </h3>

              ${
                article.description
                  ? `<p class="text-gray-600 dark:text-gray-400 text-sm mt-1">
                       ${article.description}
                     </p>`
                  : ""
              }

              <div
                class="flex items-center justify-between text-xs text-gray-500 dark:text-gray-500 mt-2"
              >
                <span class="flex items-center">
                  <i class="fas fa-clock mr-1"></i>
                  ${
                    article.hoursAgo === 0
                      ? "Just now"
                      : article.hoursAgo < 24
                      ? `${article.hoursAgo}h ago`
                      : `${Math.floor(article.hoursAgo / 24)}d ago`
                  }
                </span>
                <span
                  class="flex items-center opacity-0 group-hover:opacity-100 transition-opacity duration-150"
                >
                  <i class="fas fa-external-link-alt mr-1"></i>
                  Read more
                </span>
              </div>
            </a>
          </article>
        `
          )
          .join("");

        const loadMoreButton = hasMoreArticles
          ? `
          <div
            class="text-center mt-5 pt-4 border-t border-gray-200 dark:border-gray-700"
          >
            <button
              onclick="loadMore${county}News()"
              class="inline-flex items-center px-4 py-2 text-sm font-medium text-white bg-primary rounded-lg shadow-sm hover:shadow-md hover:bg-indigo-600 transition-all duration-150"
            >
              <i class="fas fa-plus-circle mr-2"></i>
              Load more headlines (${articles.length - visibleCount} remaining)
            </button>
          </div>
        `
          : "";

        container.innerHTML = articlesHTML + loadMoreButton;
      }

      // Load more functions (unchanged)
      function loadMoreTulareNews() {
        state.tulareVisibleCount = CONFIG.MAX_HEADLINES;
        updateTulareNews();
      }

      function loadMoreFresnoNews() {
        state.fresnoVisibleCount = CONFIG.MAX_HEADLINES;
        updateFresnoNews();
      }

      function updateTulareNews() {
        renderNewsSection(
          state.tulareNews,
          "tulare-news",
          "No Tulare County news available at the moment.",
          "fas fa-seedling",
          state.tulareVisibleCount,
          "Tulare"
        );
      }

      function updateFresnoNews() {
        renderNewsSection(
          state.fresnoNews,
          "fresno-news",
          "No Fresno County news available at the moment.",
          "fas fa-city",
          state.fresnoVisibleCount,
          "Fresno"
        );
      }

      // Last-updated UI (layout-only)
      function relativeTimeFromNow(date) {
        const diffMins = Math.floor(
          (Date.now() - date.getTime()) / 60000
        );
        if (diffMins < 1) return "Just now";
        if (diffMins < 60) return `${diffMins}m ago`;
        const hours = Math.floor(diffMins / 60);
        if (hours < 24) return `${hours}h ago`;
        const days = Math.floor(hours / 24);
        return `${days}d ago`;
      }

      function updateLastUpdated() {
        const el = document.getElementById("last-updated-value");
        if (!el || !state.lastUpdate) return;
        el.textContent = relativeTimeFromNow(state.lastUpdate);
      }

      // Initialize application
      async function initializeApp() {
        initializeDarkMode();

        // Event listeners
        document
          .getElementById("refresh-btn")
          .addEventListener("click", () => {
            loadAllData();
          });

        document
          .getElementById("theme-toggle")
          .addEventListener("click", () => {
            document.documentElement.classList.toggle("dark");
            state.isDarkMode = !state.isDarkMode;
          });

        // Load initial data
        await loadAllData();

        // Hide loading spinner
        document.getElementById("loading").classList.add("hidden");

        // Update "last updated" every minute
        setInterval(updateLastUpdated, 60 * 1000);
      }

      async function loadAllData() {
        const refreshBtn = document.getElementById("refresh-btn");
        refreshBtn.innerHTML =
          '<i class="fas fa-sync-alt animate-spin"></i>';

        try {
          await Promise.all([fetchAllNews(), fetchWeather()]);
        } catch (error) {
          console.error("Error loading data:", error);
          showError("Failed to load some data. Please try refreshing.");
        } finally {
          refreshBtn.innerHTML = '<i class="fas fa-sync-alt"></i>';
        }
      }

      // Start the application
      document.addEventListener("DOMContentLoaded", initializeApp);

      // Auto-refresh every 15 minutes
      setInterval(() => {
        loadAllData();
      }, 15 * 60 * 1000);
    </script>
  </body>
</html>
