<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="Real-time weather and news for Fresno and Tulare Counties.">
    <title>Valley Pulse</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Embedded Manifest for PWA -->
    <link rel="manifest" id="manifest-placeholder">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #e2e8f0; /* Slate 200 */
            -webkit-tap-highlight-color: transparent;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-panel {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .active-scale:active {
            transform: scale(0.96);
            transition: transform 0.1s;
        }

        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .tab-indicator {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>

    <script>
        const manifest = {
            "name": "Valley Pulse",
            "short_name": "Valley Pulse",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#0f172a",
            "theme_color": "#0f172a",
            "icons": [
                { "src": "https://cdn-icons-png.flaticon.com/512/2965/2965879.png", "sizes": "192x192", "type": "image/png" },
                { "src": "https://cdn-icons-png.flaticon.com/512/2965/2965879.png", "sizes": "512x512", "type": "image/png" }
            ]
        };
        const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelector('#manifest-placeholder').setAttribute('href', manifestURL);
        });
    </script>
</head>
<body class="min-h-screen flex flex-col pb-24">

    <!-- Header -->
    <header class="sticky top-0 z-50 glass-panel border-b border-white/5 px-4 py-3 shadow-lg">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white shadow-lg shadow-blue-500/20">
                    <i class="ph-bold ph-newspaper-clipping"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-white tracking-tight leading-none">Valley Pulse</h1>
                    <p class="text-[10px] text-slate-400 font-medium mt-0.5" id="current-date">Loading...</p>
                </div>
            </div>
            <button id="refresh-btn" onclick="refreshAll()" class="p-2 rounded-full bg-slate-800/50 hover:bg-white/10 active-scale text-blue-400 border border-white/5 transition-all">
                <i class="ph-bold ph-arrows-clockwise text-lg"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 w-full max-w-4xl mx-auto p-3 space-y-5">

        <!-- Weather Section -->
        <section>
            <div class="flex justify-between items-end mb-2 px-1">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider">Current Weather</h2>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <!-- Fresno Card -->
                <div id="weather-fresno" class="glass-panel rounded-xl p-3 relative overflow-hidden flex flex-col justify-between min-h-[130px]">
                    <div class="flex justify-between items-start relative z-10">
                        <div>
                            <h3 class="text-sm font-bold text-white">Fresno</h3>
                            <p class="text-[10px] text-slate-400">Fresno Co.</p>
                        </div>
                        <i class="ph-fill ph-map-pin text-blue-400 text-sm"></i>
                    </div>
                    <div class="mt-2 flex items-center gap-2 relative z-10">
                        <div id="icon-fresno" class="text-3xl text-yellow-400"><i class="ph-duotone ph-spinner animate-spin"></i></div>
                        <div>
                            <div class="text-2xl font-bold text-white leading-none" id="temp-fresno">--°</div>
                            <div class="text-[10px] text-slate-300 mt-1" id="desc-fresno">Loading</div>
                        </div>
                    </div>
                    <div class="mt-2 pt-2 border-t border-white/10 flex justify-between text-[10px] text-slate-400 relative z-10 font-medium">
                        <span>H:<span id="high-fresno" class="text-white ml-0.5">--</span></span>
                        <span>L:<span id="low-fresno" class="text-white ml-0.5">--</span></span>
                    </div>
                    <div class="absolute -right-4 -top-4 w-20 h-20 bg-blue-500/10 rounded-full blur-xl"></div>
                </div>

                <!-- Visalia Card -->
                <div id="weather-visalia" class="glass-panel rounded-xl p-3 relative overflow-hidden flex flex-col justify-between min-h-[130px]">
                    <div class="flex justify-between items-start relative z-10">
                        <div>
                            <h3 class="text-sm font-bold text-white">Visalia</h3>
                            <p class="text-[10px] text-slate-400">Tulare Co.</p>
                        </div>
                        <i class="ph-fill ph-map-pin text-green-400 text-sm"></i>
                    </div>
                    <div class="mt-2 flex items-center gap-2 relative z-10">
                        <div id="icon-visalia" class="text-3xl text-yellow-400"><i class="ph-duotone ph-spinner animate-spin"></i></div>
                        <div>
                            <div class="text-2xl font-bold text-white leading-none" id="temp-visalia">--°</div>
                            <div class="text-[10px] text-slate-300 mt-1" id="desc-visalia">Loading</div>
                        </div>
                    </div>
                    <div class="mt-2 pt-2 border-t border-white/10 flex justify-between text-[10px] text-slate-400 relative z-10 font-medium">
                        <span>H:<span id="high-visalia" class="text-white ml-0.5">--</span></span>
                        <span>L:<span id="low-visalia" class="text-white ml-0.5">--</span></span>
                    </div>
                    <div class="absolute -right-4 -top-4 w-20 h-20 bg-green-500/10 rounded-full blur-xl"></div>
                </div>
            </div>
        </section>

        <!-- News Section -->
        <section>
            <div class="flex flex-col gap-3 mb-3">
                <div class="flex justify-between items-center px-1">
                    <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider">Local Headlines</h2>
                </div>
                
                <!-- Tab Switcher -->
                <div class="relative bg-slate-800/50 p-1 rounded-lg flex">
                    <div id="tab-indicator" class="absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-slate-600 rounded-md shadow-sm tab-indicator z-0"></div>
                    <button onclick="switchTab('fresno')" class="flex-1 relative z-10 py-1.5 text-xs font-semibold text-center text-white transition-colors" id="tab-btn-fresno">
                        Fresno County
                    </button>
                    <button onclick="switchTab('tulare')" class="flex-1 relative z-10 py-1.5 text-xs font-semibold text-slate-400 transition-colors" id="tab-btn-tulare">
                        Tulare County
                    </button>
                </div>
            </div>

            <!-- News Grid -->
            <div id="news-container" class="grid grid-cols-2 gap-2">
                <!-- Skeletons -->
                <div class="glass-panel rounded-xl h-40 skeleton"></div>
                <div class="glass-panel rounded-xl h-40 skeleton"></div>
                <div class="glass-panel rounded-xl h-40 skeleton"></div>
                <div class="glass-panel rounded-xl h-40 skeleton"></div>
            </div>
            
            <div id="empty-state" class="hidden text-center py-12 glass-panel rounded-xl col-span-2">
                <i class="ph-duotone ph-newspaper text-3xl text-slate-600 mb-2"></i>
                <p class="text-slate-400 text-xs">No headlines found.</p>
            </div>
            
            <div id="news-error" class="hidden text-center py-12 glass-panel rounded-xl col-span-2">
                <i class="ph-duotone ph-wifi-slash text-3xl text-slate-500 mb-2"></i>
                <p class="text-slate-400 text-xs">Unable to load feeds. Check network.</p>
                <button onclick="refreshAll()" class="mt-3 px-4 py-2 bg-blue-600 text-white text-xs font-bold rounded-lg hover:bg-blue-500 transition">Retry</button>
            </div>
        </section>

    </main>

    <!-- Tab Bar -->
    <nav class="fixed bottom-0 left-0 right-0 glass-panel border-t border-white/5 pb-safe z-40">
        <div class="max-w-4xl mx-auto flex justify-around items-center h-16">
            <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="flex flex-col items-center justify-center h-full w-full gap-1 text-blue-400 active-scale group">
                <i class="ph-fill ph-squares-four text-xl group-hover:-translate-y-0.5 transition-transform"></i>
                <span class="text-[10px] font-semibold">Feed</span>
            </button>
            <button onclick="window.open('https://www.co.fresno.ca.us/', '_blank')" class="flex flex-col items-center justify-center h-full w-full gap-1 text-slate-500 hover:text-slate-200 active-scale group">
                <i class="ph-bold ph-buildings text-xl group-hover:-translate-y-0.5 transition-transform"></i>
                <span class="text-[10px] font-medium">Fresno Gov</span>
            </button>
            <button onclick="window.open('https://tularecounty.ca.gov/', '_blank')" class="flex flex-col items-center justify-center h-full w-full gap-1 text-slate-500 hover:text-slate-200 active-scale group">
                <i class="ph-bold ph-tree text-xl group-hover:-translate-y-0.5 transition-transform"></i>
                <span class="text-[10px] font-medium">Tulare Gov</span>
            </button>
        </div>
    </nav>

    <script>
        // --- Configuration ---
        const LOCATIONS = {
            fresno: { lat: 36.7378, lon: -119.7871 },
            visalia: { lat: 36.3302, lon: -119.2921 }
        };

        const NEWS_SOURCES = [
            { name: 'ABC30', url: 'https://abc30.com/feed/', color: 'text-blue-400' },
            { name: 'KSEE24', url: 'https://www.yourcentralvalley.com/feed/', color: 'text-indigo-400' },
            { name: 'KMPH', url: 'https://kmph.com/rss', color: 'text-orange-400' }
        ];

        // Expanded Proxy list to handle failures
        const PROXIES = [
            // CodeTabs - often reliable
            url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
            // AllOrigins - supports specific disableCache param
            url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}&disableCache=true`,
            // CorsProxy.io - fallback
            url => `https://corsproxy.io/?${encodeURIComponent(url)}`
        ];

        const TULARE_KEYWORDS = ['visalia', 'tulare', 'porterville', 'hanford', 'lemoore', 'dinuba', 'exeter', 'kingsburg', 'strathmore', 'lindsay', 'woodlake', 'south valley', 'earlimart', 'pixley'];
        const FRESNO_KEYWORDS = ['fresno', 'clovis', 'madera', 'sanger', 'selma', 'reedley', 'fowler', 'kerman', 'coalinga', 'firebaugh', 'mendota', 'shaver'];

        let allArticles = [];
        let currentTab = 'fresno';

        // --- Utilities ---
        function parseRSSDate(dateStr) {
            try {
                let d = new Date(dateStr);
                if (!isNaN(d.getTime())) return d;
                return new Date();
            } catch (e) { return new Date(); }
        }

        function updateDate() {
            const now = new Date();
            document.getElementById('current-date').textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }

        // --- Weather Logic ---
        async function fetchWeather(key) {
            const loc = LOCATIONS[key];
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&windspeed_unit=mph&timezone=America%2FLos_Angeles&t=${Date.now()}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                const current = data.current_weather;
                const daily = data.daily;

                document.getElementById(`temp-${key}`).textContent = `${Math.round(current.temperature)}°`;
                document.getElementById(`icon-${key}`).innerHTML = getWeatherIcon(current.weathercode);
                document.getElementById(`desc-${key}`).textContent = getWeatherDesc(current.weathercode);
                
                if(daily) {
                    document.getElementById(`high-${key}`).textContent = `${Math.round(daily.temperature_2m_max[0])}°`;
                    document.getElementById(`low-${key}`).textContent = `${Math.round(daily.temperature_2m_min[0])}°`;
                }
            } catch (error) { console.error(error); }
        }

        function getWeatherIcon(code) {
            if (code === 0) return '<i class="ph-fill ph-sun text-yellow-400"></i>';
            if (code <= 3) return '<i class="ph-fill ph-cloud-sun text-yellow-200"></i>';
            if (code <= 48) return '<i class="ph-fill ph-cloud-fog text-slate-400"></i>';
            if (code <= 67) return '<i class="ph-fill ph-cloud-rain text-blue-400"></i>';
            if (code <= 77) return '<i class="ph-fill ph-snowflake text-cyan-200"></i>';
            if (code >= 95) return '<i class="ph-fill ph-cloud-lightning text-purple-400"></i>';
            return '<i class="ph-fill ph-cloud text-slate-400"></i>';
        }
        function getWeatherDesc(code) {
            const codes = { 0:'Clear', 1:'Fair', 2:'Cloudy', 3:'Overcast', 45:'Fog', 48:'Fog', 51:'Drizzle', 61:'Rain', 63:'Rain', 95:'Storm' };
            return codes[code] || 'Cloudy';
        }

        // --- Robust Fetcher ---
        async function fetchWithFallback(sourceUrl) {
            // Add a timestamp specifically for caches that respect query params
            const ts = Date.now();
            
            for (const proxyFn of PROXIES) {
                const proxyUrl = proxyFn(sourceUrl);
                try {
                    // Note: Some proxies like corsproxy.io might not like extra params appended blindly
                    // but for most, appending &t=... or ?t=... is safe if done carefully.
                    // We rely on the PROXIES definition to handle encoding.
                    // We append a cache buster only if the proxy string already has params,
                    // or handle it inside the proxy def.
                    // Simplified: Just fetch. AllOrigins handled via disableCache. CodeTabs ignores extra params usually.
                    
                    const res = await fetch(proxyUrl);
                    if (!res.ok) throw new Error(`Status ${res.status}`);
                    const text = await res.text();
                    
                    // Validation: RSS/XML should start with <
                    if (text.trim().startsWith('<')) {
                        return text;
                    }
                    throw new Error('Response was not XML');
                } catch (e) {
                    console.warn(`Proxy attempt failed for ${sourceUrl}:`, e);
                    continue; // Try next proxy
                }
            }
            throw new Error(`All proxies failed for ${sourceUrl}`);
        }

        // --- XML Parsing Logic ---
        function parseXMLFeed(xmlText, source) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");
            const items = Array.from(xmlDoc.querySelectorAll("item"));
            
            return items.map(item => {
                const title = item.querySelector("title")?.textContent || "";
                const link = item.querySelector("link")?.textContent || "";
                const pubDate = item.querySelector("pubDate")?.textContent || "";
                const description = item.querySelector("description")?.textContent || "";
                const content = item.getElementsByTagNameNS("*", "content")[0]?.textContent || "";

                let imageUrl = null;
                
                // 1. Check Media Namespace
                const mediaContent = item.getElementsByTagNameNS("*", "content");
                for(let i=0; i<mediaContent.length; i++) {
                    if(mediaContent[i].getAttribute("type")?.includes("image") || mediaContent[i].getAttribute("medium") === "image") {
                        imageUrl = mediaContent[i].getAttribute("url");
                        break;
                    }
                }
                
                // 2. Check Enclosure
                if(!imageUrl) {
                    const enclosure = item.querySelector("enclosure");
                    if(enclosure && enclosure.getAttribute("type")?.includes("image")) {
                        imageUrl = enclosure.getAttribute("url");
                    }
                }

                // 3. Regex Search
                if(!imageUrl) {
                    const imgRegex = /<img[^>]+src="([^">]+)"/;
                    const match = description.match(imgRegex) || content.match(imgRegex);
                    if (match) imageUrl = match[1];
                }

                return {
                    title,
                    link,
                    pubDateObj: parseRSSDate(pubDate),
                    imageUrl,
                    sourceName: source.name,
                    sourceColor: source.color,
                    description 
                };
            });
        }

        async function fetchNews() {
            const container = document.getElementById('news-container');
            const errorDiv = document.getElementById('news-error');
            
            container.innerHTML = `
                <div class="glass-panel rounded-xl h-40 skeleton"></div>
                <div class="glass-panel rounded-xl h-40 skeleton"></div>
                <div class="glass-panel rounded-xl h-40 skeleton"></div>
                <div class="glass-panel rounded-xl h-40 skeleton"></div>
            `;
            errorDiv.classList.add('hidden');

            const feedPromises = NEWS_SOURCES.map(source => 
                fetchWithFallback(source.url)
                .then(rawXML => parseXMLFeed(rawXML, source))
                .catch(err => {
                    console.error(`Final failure for ${source.name}:`, err);
                    return [];
                })
            );

            try {
                const results = await Promise.all(feedPromises);
                allArticles = results.flat();

                const seen = new Set();
                allArticles = allArticles.filter(a => {
                    const key = a.title;
                    if (seen.has(key)) return false;
                    seen.add(key);
                    return true;
                });

                if (allArticles.length === 0) throw new Error("No items parsed");

                allArticles.sort((a, b) => b.pubDateObj.getTime() - a.pubDateObj.getTime());
                renderNews();

            } catch (error) {
                console.error(error);
                container.innerHTML = '';
                errorDiv.classList.remove('hidden');
            }
        }

        function filterNews(articles, tab) {
            return articles.filter(article => {
                const text = (article.title + " " + (article.description || "")).toLowerCase();
                
                const isTulare = TULARE_KEYWORDS.some(k => text.includes(k));
                const isFresno = FRESNO_KEYWORDS.some(k => text.includes(k));

                if (tab === 'tulare') {
                    if (isTulare) return true;
                    if (isFresno) return false; 
                    return true; 
                } else {
                    if (isFresno) return true;
                    if (isTulare) return false;
                    return true; 
                }
            });
        }

        function renderNews() {
            const container = document.getElementById('news-container');
            const emptyState = document.getElementById('empty-state');
            const filtered = filterNews(allArticles, currentTab);

            container.innerHTML = '';
            
            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            filtered.slice(0, 25).forEach(article => {
                const card = document.createElement('a');
                card.href = article.link;
                card.target = "_blank";
                card.className = "flex flex-col glass-panel rounded-xl overflow-hidden hover:bg-slate-800 transition active-scale group h-full";
                
                let imgHtml;
                if (article.imageUrl) {
                    imgHtml = `<img src="${article.imageUrl}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity group-hover:scale-105 duration-500" onerror="this.style.display='none';this.parentElement.querySelector('.fallback-icon').style.display='flex'">
                               <div class="fallback-icon hidden w-full h-full items-center justify-center bg-slate-800"><i class="ph-duotone ph-newspaper text-3xl text-slate-600"></i></div>`;
                } else {
                    const hue = (article.title.length * 7) % 360;
                    imgHtml = `<div class="w-full h-full flex items-center justify-center" style="background: linear-gradient(135deg, hsl(${hue}, 40%, 20%), hsl(${hue}, 40%, 10%))"><i class="ph-duotone ph-newspaper text-3xl text-white/20"></i></div>`;
                }

                const now = new Date();
                const diffMins = Math.floor((now - article.pubDateObj) / 60000);
                const diffHrs = Math.floor(diffMins / 60);
                let timeString = diffMins < 60 ? `${diffMins}m` : diffHrs > 24 ? `${Math.floor(diffHrs/24)}d` : `${diffHrs}h`;

                const txt = document.createElement('textarea');
                txt.innerHTML = article.title;
                const cleanTitle = txt.value;

                card.innerHTML = `
                    <div class="h-28 w-full overflow-hidden bg-slate-800 relative">
                         ${imgHtml}
                         <div class="absolute top-1.5 left-1.5 bg-slate-900/80 backdrop-blur-sm px-1.5 py-0.5 rounded text-[9px] font-bold text-white uppercase tracking-wide border border-white/10 shadow-sm">
                            ${timeString}
                         </div>
                    </div>
                    <div class="p-3 flex flex-col flex-1">
                        <span class="text-[9px] font-bold uppercase tracking-wider mb-1 ${article.sourceColor}">${article.sourceName}</span>
                        <h3 class="text-xs font-medium text-slate-200 leading-snug line-clamp-3 group-hover:text-white">${cleanTitle}</h3>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            const indicator = document.getElementById('tab-indicator');
            const fresnoBtn = document.getElementById('tab-btn-fresno');
            const tulareBtn = document.getElementById('tab-btn-tulare');

            if (tab === 'fresno') {
                indicator.style.transform = 'translateX(0)';
                fresnoBtn.classList.replace('text-slate-400', 'text-white');
                tulareBtn.classList.replace('text-white', 'text-slate-400');
            } else {
                indicator.style.transform = 'translateX(100%) translateX(8px)';
                tulareBtn.classList.replace('text-slate-400', 'text-white');
                fresnoBtn.classList.replace('text-white', 'text-slate-400');
            }
            renderNews();
        }

        async function refreshAll() {
            const btnIcon = document.querySelector('#refresh-btn i');
            btnIcon.classList.add('animate-spin');
            
            await Promise.all([
                fetchWeather('fresno'),
                fetchWeather('visalia'),
                fetchNews(),
                new Promise(r => setTimeout(r, 500))
            ]);

            updateDate();
            btnIcon.classList.remove('animate-spin');
        }

        refreshAll();
        setInterval(refreshAll, 600000);
    </script>
</body>
</html>
