<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="Real-time weather, air quality, and news for Fresno and Tulare Counties.">
    <title>Valley Pulse</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Embedded Manifest for PWA -->
    <link rel="manifest" id="manifest-placeholder">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #e2e8f0; /* Slate 200 */
            -webkit-tap-highlight-color: transparent;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-panel {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .active-scale:active {
            transform: scale(0.96);
            transition: transform 0.1s;
        }

        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .tab-indicator {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toast {
            transform: translateY(100%);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>

    <script>
        const manifest = {
            "name": "Valley Pulse",
            "short_name": "Valley Pulse",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#0f172a",
            "theme_color": "#0f172a",
            "icons": [
                { "src": "https://cdn-icons-png.flaticon.com/512/2965/2965879.png", "sizes": "192x192", "type": "image/png" },
                { "src": "https://cdn-icons-png.flaticon.com/512/2965/2965879.png", "sizes": "512x512", "type": "image/png" }
            ]
        };
        const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelector('#manifest-placeholder').setAttribute('href', manifestURL);
        });
    </script>
</head>
<body class="min-h-screen flex flex-col pb-24">

    <!-- Header -->
    <header class="sticky top-0 z-50 glass-panel border-b border-white/5 px-4 py-3 shadow-lg">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white shadow-lg shadow-blue-500/20">
                    <i class="ph-bold ph-newspaper-clipping"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-white tracking-tight leading-none">Valley Pulse</h1>
                    <p class="text-[10px] text-slate-400 font-medium mt-0.5" id="status-text">Ready</p>
                </div>
            </div>
            <button id="refresh-btn" onclick="refreshAll(true)" class="p-2 rounded-full bg-slate-800/50 hover:bg-white/10 active-scale text-blue-400 border border-white/5 transition-all">
                <i class="ph-bold ph-arrows-clockwise text-lg"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 w-full max-w-4xl mx-auto p-3 space-y-5">

        <!-- Weather Section -->
        <section>
            <div class="flex justify-between items-end mb-2 px-1">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider">Conditions</h2>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <!-- Fresno Card -->
                <div id="weather-fresno" class="glass-panel rounded-xl p-3 relative overflow-hidden flex flex-col justify-between min-h-[140px]">
                    <div class="flex justify-between items-start relative z-10">
                        <div>
                            <h3 class="text-sm font-bold text-white">Fresno</h3>
                            <p class="text-[10px] text-slate-400">Fresno Co.</p>
                        </div>
                        <!-- AQI Badge -->
                        <div id="aqi-badge-fresno" class="hidden flex items-center gap-1.5 px-2 py-1 rounded bg-slate-900/40 border border-white/5 backdrop-blur-sm">
                            <span class="text-[9px] font-bold text-slate-400">AQI</span>
                            <span id="aqi-fresno" class="text-[10px] font-bold">--</span>
                        </div>
                    </div>
                    <div class="mt-2 flex items-center gap-2 relative z-10">
                        <div id="icon-fresno" class="text-3xl text-yellow-400"><i class="ph-duotone ph-spinner animate-spin"></i></div>
                        <div>
                            <div class="text-2xl font-bold text-white leading-none" id="temp-fresno">--°</div>
                            <div class="text-[10px] text-slate-300 mt-1" id="desc-fresno">Loading</div>
                        </div>
                    </div>
                    <div class="mt-2 pt-2 border-t border-white/10 flex justify-between text-[10px] text-slate-400 relative z-10 font-medium">
                        <span>H:<span id="high-fresno" class="text-white ml-0.5">--</span></span>
                        <span>L:<span id="low-fresno" class="text-white ml-0.5">--</span></span>
                    </div>
                    <div class="absolute -right-4 -top-4 w-20 h-20 bg-blue-500/10 rounded-full blur-xl"></div>
                </div>

                <!-- Visalia Card -->
                <div id="weather-visalia" class="glass-panel rounded-xl p-3 relative overflow-hidden flex flex-col justify-between min-h-[140px]">
                    <div class="flex justify-between items-start relative z-10">
                        <div>
                            <h3 class="text-sm font-bold text-white">Visalia</h3>
                            <p class="text-[10px] text-slate-400">Tulare Co.</p>
                        </div>
                        <!-- AQI Badge -->
                        <div id="aqi-badge-visalia" class="hidden flex items-center gap-1.5 px-2 py-1 rounded bg-slate-900/40 border border-white/5 backdrop-blur-sm">
                            <span class="text-[9px] font-bold text-slate-400">AQI</span>
                            <span id="aqi-visalia" class="text-[10px] font-bold">--</span>
                        </div>
                    </div>
                    <div class="mt-2 flex items-center gap-2 relative z-10">
                        <div id="icon-visalia" class="text-3xl text-yellow-400"><i class="ph-duotone ph-spinner animate-spin"></i></div>
                        <div>
                            <div class="text-2xl font-bold text-white leading-none" id="temp-visalia">--°</div>
                            <div class="text-[10px] text-slate-300 mt-1" id="desc-visalia">Loading</div>
                        </div>
                    </div>
                    <div class="mt-2 pt-2 border-t border-white/10 flex justify-between text-[10px] text-slate-400 relative z-10 font-medium">
                        <span>H:<span id="high-visalia" class="text-white ml-0.5">--</span></span>
                        <span>L:<span id="low-visalia" class="text-white ml-0.5">--</span></span>
                    </div>
                    <div class="absolute -right-4 -top-4 w-20 h-20 bg-green-500/10 rounded-full blur-xl"></div>
                </div>
            </div>
            <div class="flex justify-end mt-1 px-1">
                <span class="text-[9px] text-slate-600">Weather & AQI by Open-Meteo</span>
            </div>
        </section>

        <!-- News Section -->
        <section>
            <div class="flex flex-col gap-3 mb-3">
                <div class="flex justify-between items-center px-1">
                    <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider">Headlines</h2>
                    <span id="last-updated" class="text-[9px] text-slate-500"></span>
                </div>
                
                <!-- Tab Switcher -->
                <div class="relative bg-slate-800/50 p-1 rounded-lg flex">
                    <div id="tab-indicator" class="absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-slate-600 rounded-md shadow-sm tab-indicator z-0"></div>
                    <button onclick="switchTab('fresno')" class="flex-1 relative z-10 py-1.5 text-xs font-semibold text-center text-white transition-colors" id="tab-btn-fresno">
                        Fresno County
                    </button>
                    <button onclick="switchTab('tulare')" class="flex-1 relative z-10 py-1.5 text-xs font-semibold text-slate-400 transition-colors" id="tab-btn-tulare">
                        Tulare County
                    </button>
                </div>
            </div>

            <!-- News Grid -->
            <div id="news-container" class="grid grid-cols-2 gap-2 min-h-[200px]">
                <!-- Skeletons -->
                <div class="glass-panel rounded-xl h-40 skeleton"></div>
                <div class="glass-panel rounded-xl h-40 skeleton"></div>
            </div>
            
            <div id="empty-state" class="hidden text-center py-12 glass-panel rounded-xl col-span-2">
                <i class="ph-duotone ph-newspaper text-3xl text-slate-600 mb-2"></i>
                <p class="text-slate-400 text-xs">No headlines found.</p>
            </div>
            
            <div id="news-error" class="hidden text-center py-12 glass-panel rounded-xl col-span-2">
                <i class="ph-duotone ph-wifi-slash text-3xl text-slate-500 mb-2"></i>
                <p class="text-slate-400 text-xs">Unable to connect.</p>
                <button onclick="refreshAll(true)" class="mt-3 px-4 py-2 bg-blue-600 text-white text-xs font-bold rounded-lg">Retry</button>
            </div>
        </section>

    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-20 left-1/2 -translate-x-1/2 bg-slate-800 border border-white/10 px-4 py-2 rounded-full shadow-xl flex items-center gap-2 z-50 toast">
        <i class="ph-fill ph-check-circle text-green-400" id="toast-icon"></i>
        <span class="text-xs font-medium text-white" id="toast-msg">Updated</span>
    </div>

    <!-- Tab Bar -->
    <nav class="fixed bottom-0 left-0 right-0 glass-panel border-t border-white/5 pb-safe z-40">
        <div class="max-w-4xl mx-auto flex justify-around items-center h-16">
            <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="flex flex-col items-center justify-center h-full w-full gap-1 text-blue-400 active-scale group">
                <i class="ph-fill ph-squares-four text-xl group-hover:-translate-y-0.5 transition-transform"></i>
                <span class="text-[10px] font-semibold">Feed</span>
            </button>
            <button onclick="window.open('https://www.co.fresno.ca.us/', '_blank')" class="flex flex-col items-center justify-center h-full w-full gap-1 text-slate-500 hover:text-slate-200 active-scale group">
                <i class="ph-bold ph-buildings text-xl group-hover:-translate-y-0.5 transition-transform"></i>
                <span class="text-[10px] font-medium">Fresno Gov</span>
            </button>
            <button onclick="window.open('https://tularecounty.ca.gov/', '_blank')" class="flex flex-col items-center justify-center h-full w-full gap-1 text-slate-500 hover:text-slate-200 active-scale group">
                <i class="ph-bold ph-tree text-xl group-hover:-translate-y-0.5 transition-transform"></i>
                <span class="text-[10px] font-medium">Tulare Gov</span>
            </button>
        </div>
    </nav>

    <script>
        // --- Configuration ---
        const LOCATIONS = {
            fresno: { lat: 36.7378, lon: -119.7871 },
            visalia: { lat: 36.3302, lon: -119.2921 }
        };

        const NEWS_SOURCES = [
            { name: 'ABC30', url: 'https://abc30.com/feed/', color: 'text-blue-400' },
            { name: 'KSEE24', url: 'https://www.yourcentralvalley.com/feed/', color: 'text-indigo-400' },
            { name: 'KMPH', url: 'https://kmph.com/rss', color: 'text-orange-400' }
        ];

        const PROXIES = [
            url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
            url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            url => `https://corsproxy.io/?${encodeURIComponent(url)}`
        ];

        const TULARE_KEYWORDS = ['visalia', 'tulare', 'porterville', 'hanford', 'lemoore', 'dinuba', 'exeter', 'kingsburg', 'strathmore', 'lindsay', 'woodlake', 'south valley', 'earlimart', 'pixley'];
        const FRESNO_KEYWORDS = ['fresno', 'clovis', 'madera', 'sanger', 'selma', 'reedley', 'fowler', 'kerman', 'coalinga', 'firebaugh', 'mendota', 'shaver'];

        let allArticles = [];
        let currentTab = 'fresno';

        // --- Helpers ---
        function saveCache(articles) {
            try {
                const cacheData = { timestamp: Date.now(), articles: articles };
                localStorage.setItem('valley_pulse_news', JSON.stringify(cacheData));
                document.getElementById('last-updated').textContent = 'Updated just now';
            } catch (e) {}
        }

        function loadCache() {
            try {
                const cached = localStorage.getItem('valley_pulse_news');
                if (cached) {
                    const data = JSON.parse(cached);
                    allArticles = data.articles.map(a => ({...a, pubDateObj: new Date(a.pubDateObj)}));
                    const minsAgo = Math.floor((Date.now() - data.timestamp) / 60000);
                    document.getElementById('last-updated').textContent = minsAgo < 60 ? `Updated ${minsAgo}m ago` : 'Updated a while ago';
                    renderNews();
                    return true;
                }
            } catch (e) {}
            return false;
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const text = document.getElementById('toast-msg');
            text.textContent = msg;
            icon.className = type === 'success' ? 'ph-fill ph-check-circle text-green-400' : 'ph-fill ph-warning-circle text-red-400';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // --- Weather & AQI Logic ---
        
        function getAQIStyle(aqi) {
            if (aqi <= 50) return { text: 'Good', class: 'text-green-400' };
            if (aqi <= 100) return { text: 'Moderate', class: 'text-yellow-400' };
            if (aqi <= 150) return { text: 'Unhealthy (Sens.)', class: 'text-orange-400' };
            if (aqi <= 200) return { text: 'Unhealthy', class: 'text-red-400' };
            return { text: 'Hazardous', class: 'text-purple-400' };
        }

        async function fetchWeather(key) {
            const loc = LOCATIONS[key];
            const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&windspeed_unit=mph&timezone=America%2FLos_Angeles`;
            const aqiUrl = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${loc.lat}&longitude=${loc.lon}&current=us_aqi`;

            try {
                const resW = await fetch(weatherUrl);
                const dataW = await resW.json();
                const current = dataW.current_weather;
                const daily = dataW.daily;

                document.getElementById(`temp-${key}`).textContent = `${Math.round(current.temperature)}°`;
                document.getElementById(`icon-${key}`).innerHTML = getWeatherIcon(current.weathercode);
                document.getElementById(`desc-${key}`).textContent = getWeatherDesc(current.weathercode);
                if(daily) {
                    document.getElementById(`high-${key}`).textContent = `${Math.round(daily.temperature_2m_max[0])}°`;
                    document.getElementById(`low-${key}`).textContent = `${Math.round(daily.temperature_2m_min[0])}°`;
                }

                // AQI
                try {
                    const resA = await fetch(aqiUrl);
                    const dataA = await resA.json();
                    const aqi = dataA.current.us_aqi;
                    const badge = document.getElementById(`aqi-badge-${key}`);
                    const val = document.getElementById(`aqi-${key}`);
                    
                    const style = getAQIStyle(aqi);
                    val.textContent = `${aqi} ${style.text}`;
                    val.className = `text-[10px] font-bold ${style.class}`;
                    badge.classList.remove('hidden');
                } catch (aqiErr) { console.warn("AQI fail", aqiErr); }

            } catch (error) { console.error(error); }
        }

        function getWeatherIcon(code) {
            if (code === 0) return '<i class="ph-fill ph-sun text-yellow-400"></i>';
            if (code <= 3) return '<i class="ph-fill ph-cloud-sun text-yellow-200"></i>';
            if (code <= 48) return '<i class="ph-fill ph-cloud-fog text-slate-400"></i>';
            if (code <= 67) return '<i class="ph-fill ph-cloud-rain text-blue-400"></i>';
            if (code <= 77) return '<i class="ph-fill ph-snowflake text-cyan-200"></i>';
            if (code >= 95) return '<i class="ph-fill ph-cloud-lightning text-purple-400"></i>';
            return '<i class="ph-fill ph-cloud text-slate-400"></i>';
        }
        function getWeatherDesc(code) {
            const codes = { 0:'Clear', 1:'Fair', 2:'Cloudy', 3:'Overcast', 45:'Fog', 48:'Fog', 51:'Drizzle', 61:'Rain', 95:'Storm' };
            return codes[code] || 'Cloudy';
        }

        // --- Fetch Logic ---
        async function fetchWithFallback(sourceUrl) {
            for (const proxyFn of PROXIES) {
                const proxyUrl = proxyFn(sourceUrl);
                try {
                    const controller = new AbortController();
                    const id = setTimeout(() => controller.abort(), 8000);
                    const res = await fetch(proxyUrl, { signal: controller.signal });
                    clearTimeout(id);
                    if (!res.ok) throw new Error(`Status ${res.status}`);
                    const text = await res.text();
                    if (text.trim().startsWith('<')) return text;
                } catch (e) { continue; }
            }
            throw new Error('All proxies failed');
        }

        function parseXMLFeed(xmlText, source) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");
            return Array.from(xmlDoc.querySelectorAll("item")).map(item => {
                const title = item.querySelector("title")?.textContent || "";
                const link = item.querySelector("link")?.textContent || "";
                const pubDateStr = item.querySelector("pubDate")?.textContent || "";
                const description = item.querySelector("description")?.textContent || "";
                const content = item.getElementsByTagNameNS("*", "content")[0]?.textContent || "";

                let imageUrl = null;
                const mediaContent = item.getElementsByTagNameNS("*", "content");
                for(let i=0; i<mediaContent.length; i++) {
                    if(mediaContent[i].getAttribute("type")?.includes("image") || mediaContent[i].getAttribute("medium") === "image") {
                        imageUrl = mediaContent[i].getAttribute("url");
                        break;
                    }
                }
                if(!imageUrl) {
                    const enc = item.querySelector("enclosure");
                    if(enc && enc.getAttribute("type")?.includes("image")) imageUrl = enc.getAttribute("url");
                }
                if(!imageUrl) {
                    const match = description.match(/<img[^>]+src="([^">]+)"/) || content.match(/<img[^>]+src="([^">]+)"/);
                    if (match) imageUrl = match[1];
                }
                let d = new Date(pubDateStr);
                if(isNaN(d.getTime())) d = new Date();

                return { title, link, pubDateObj: d, imageUrl, sourceName: source.name, sourceColor: source.color, description };
            });
        }

        async function fetchNews() {
            const btnIcon = document.querySelector('#refresh-btn i');
            const statusText = document.getElementById('status-text');
            statusText.textContent = "Updating...";
            btnIcon.classList.add('animate-spin');

            const promises = NEWS_SOURCES.map(src => 
                fetchWithFallback(src.url).then(xml => parseXMLFeed(xml, src)).catch(e => [])
            );

            try {
                const results = await Promise.all(promises);
                const flat = results.flat();
                if (flat.length > 0) {
                    const seen = new Set();
                    allArticles = flat.filter(a => {
                        const k = a.title;
                        if(seen.has(k)) return false;
                        seen.add(k);
                        return true;
                    });
                    allArticles.sort((a, b) => b.pubDateObj - a.pubDateObj);
                    saveCache(allArticles); 
                    renderNews();
                    showToast('Feed updated');
                } else {
                    if (allArticles.length === 0) throw new Error("No items");
                    showToast('No new stories', 'error');
                }
            } catch (e) {
                console.error(e);
                if(allArticles.length > 0) showToast('Update failed', 'error');
                else {
                    document.getElementById('news-container').innerHTML = '';
                    document.getElementById('news-error').classList.remove('hidden');
                }
            } finally {
                btnIcon.classList.remove('animate-spin');
                statusText.textContent = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            }
        }

        function filterNews(articles, tab) {
            return articles.filter(article => {
                const text = (article.title + " " + (article.description || "")).toLowerCase();
                const isTulare = TULARE_KEYWORDS.some(k => text.includes(k));
                const isFresno = FRESNO_KEYWORDS.some(k => text.includes(k));
                if (tab === 'tulare') return isTulare || !isFresno; 
                else return isFresno || !isTulare;
            });
        }

        function renderNews() {
            const container = document.getElementById('news-container');
            const emptyState = document.getElementById('empty-state');
            const errorDiv = document.getElementById('news-error');
            errorDiv.classList.add('hidden');
            
            const filtered = filterNews(allArticles, currentTab);
            container.innerHTML = '';
            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            filtered.slice(0, 25).forEach(article => {
                const card = document.createElement('a');
                card.href = article.link;
                card.target = "_blank";
                card.className = "flex flex-col glass-panel rounded-xl overflow-hidden hover:bg-slate-800 transition active-scale group h-full";
                
                let imgHtml;
                if (article.imageUrl) {
                    imgHtml = `<img src="${article.imageUrl}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity group-hover:scale-105 duration-500" onerror="this.style.display='none';this.parentElement.querySelector('.fallback-icon').style.display='flex'">
                               <div class="fallback-icon hidden w-full h-full items-center justify-center bg-slate-800"><i class="ph-duotone ph-newspaper text-3xl text-slate-600"></i></div>`;
                } else {
                    const hue = (article.title.length * 7) % 360;
                    imgHtml = `<div class="w-full h-full flex items-center justify-center" style="background: linear-gradient(135deg, hsl(${hue}, 40%, 20%), hsl(${hue}, 40%, 10%))"><i class="ph-duotone ph-newspaper text-3xl text-white/20"></i></div>`;
                }
                const now = new Date();
                const diffMins = Math.floor((now - article.pubDateObj) / 60000);
                const diffHrs = Math.floor(diffMins / 60);
                let timeString = diffMins < 60 ? `${diffMins}m` : diffHrs > 24 ? `${Math.floor(diffHrs/24)}d` : `${diffHrs}h`;
                const txt = document.createElement('textarea');
                txt.innerHTML = article.title;
                const cleanTitle = txt.value;

                card.innerHTML = `
                    <div class="h-28 w-full overflow-hidden bg-slate-800 relative">
                         ${imgHtml}
                         <div class="absolute top-1.5 left-1.5 bg-slate-900/80 backdrop-blur-sm px-1.5 py-0.5 rounded text-[9px] font-bold text-white uppercase tracking-wide border border-white/10 shadow-sm">
                            ${timeString}
                         </div>
                    </div>
                    <div class="p-3 flex flex-col flex-1">
                        <span class="text-[9px] font-bold uppercase tracking-wider mb-1 ${article.sourceColor}">${article.sourceName}</span>
                        <h3 class="text-xs font-medium text-slate-200 leading-snug line-clamp-3 group-hover:text-white">${cleanTitle}</h3>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            const indicator = document.getElementById('tab-indicator');
            const fresnoBtn = document.getElementById('tab-btn-fresno');
            const tulareBtn = document.getElementById('tab-btn-tulare');
            if (tab === 'fresno') {
                indicator.style.transform = 'translateX(0)';
                fresnoBtn.classList.replace('text-slate-400', 'text-white');
                tulareBtn.classList.replace('text-white', 'text-slate-400');
            } else {
                indicator.style.transform = 'translateX(100%) translateX(8px)';
                tulareBtn.classList.replace('text-slate-400', 'text-white');
                fresnoBtn.classList.replace('text-white', 'text-slate-400');
            }
            renderNews();
        }

        async function refreshAll(force = false) {
            if(force) {
                fetchWeather('fresno');
                fetchWeather('visalia');
                await fetchNews();
            } else {
                const hasCache = loadCache();
                fetchWeather('fresno');
                fetchWeather('visalia');
                if(!hasCache) await fetchNews();
                else fetchNews();
            }
        }

        refreshAll(false);
    </script>
</body>
</html>
